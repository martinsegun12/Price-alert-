<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#00d4aa"/>
  <title>POI Alert</title>
  <link rel="manifest" href="/static/manifest.json"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    :root{--bg:#090c12;--surface:#111827;--border:#1e2d40;--accent:#00d4aa;--danger:#ef4444;--buy:#10b981;--sell:#f43f5e;--text:#e2e8f0;--muted:#64748b;--warn:#f59e0b}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px 12px 40px;display:flex;flex-direction:column;align-items:center}
    header{width:100%;max-width:500px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .logo{display:flex;align-items:center;gap:8px}
    .logo-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
    .logo h1{font-size:16px;font-weight:700}.logo h1 span{color:var(--accent)}
    .badge{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:3px 8px;border-radius:20px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;width:100%;max-width:500px;margin-bottom:12px}
    .card-title{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
    label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:5px}
    input,select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:10px 12px;font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;margin-bottom:10px}
    input:focus,select:focus{border-color:var(--accent)}
    input::placeholder{color:var(--muted)}
    select option{background:var(--surface)}
    .mono{font-family:'JetBrains Mono',monospace}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn{width:100%;padding:12px;border-radius:10px;border:none;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s}
    .btn-add{background:var(--accent);color:#090c12;margin-top:4px}
    .btn-add:hover{opacity:0.88}
    .btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
    .btn-danger{background:var(--danger);color:#fff}
    .notif-status{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:12px;margin-top:8px}
    .notif-status.ok{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:var(--buy)}
    .notif-status.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--danger)}
    .notif-status.pending{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:var(--warn)}

    /* Alert cards list */
    .alerts-list{display:flex;flex-direction:column;gap:10px}
    .alert-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;transition:border-color 0.3s}
    .alert-card.triggered{border-color:var(--danger);animation:flicker 1s infinite}
    .alert-card.watching{border-color:rgba(0,212,170,0.3)}
    @keyframes flicker{0%,100%{opacity:1}50%{opacity:0.6}}
    .alert-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .alert-pair{font-size:15px;font-weight:700;color:var(--text)}
    .alert-remove{background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
    .alert-remove:hover{color:var(--danger)}
    .alert-price{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:var(--accent);line-height:1}
    .alert-meta{display:flex;justify-content:space-between;align-items:flex-end;margin-top:4px}
    .alert-poi{font-size:11px;color:var(--muted)}
    .alert-poi span{color:var(--warn);font-weight:700;font-family:'JetBrains Mono',monospace}
    .alert-change{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
    .alert-change.up{color:var(--buy)}.alert-change.down{color:var(--sell)}
    .dist-wrap{margin-top:10px}
    .dist-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px}
    .dist-label span:last-child{font-family:'JetBrains Mono',monospace;color:var(--text)}
    .track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
    .fill{height:100%;border-radius:2px;transition:width 0.5s,background 0.3s}
    .alert-status{font-size:11px;margin-top:6px;padding:5px 8px;border-radius:6px;display:inline-block}
    .alert-status.watching{background:rgba(0,212,170,0.08);color:var(--accent)}
    .alert-status.triggered{background:rgba(239,68,68,0.1);color:var(--danger);font-weight:700}
    .alert-updated{font-size:10px;color:var(--muted);margin-top:4px}

    .empty-alerts{text-align:center;color:var(--muted);font-size:13px;padding:24px;border:1px dashed var(--border);border-radius:12px}

    /* Log */
    .log-list{list-style:none;display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto}
    .log-item{display:flex;gap:8px;padding:8px 10px;border-radius:7px;background:var(--bg);border:1px solid var(--border);font-size:11px}
    .log-t{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;margin-top:1px}
    .log-m{color:var(--text);line-height:1.4}
    .empty{text-align:center;color:var(--muted);font-size:13px;padding:16px}

    .clear-btn{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;float:right;margin-top:-2px}
    .clear-btn:hover{color:var(--danger)}
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <h1>POI<span>Alert</span></h1>
  </div>
  <div class="badge" id="pair-count">0 watching</div>
</header>

<!-- NOTIFICATIONS -->
<div class="card">
  <div class="card-title">🔔 Push Notifications</div>
  <button class="btn btn-outline" id="notif-btn" onclick="requestNotifPermission()">Enable Push Notifications</button>
  <div class="notif-status pending" id="notif-status">⏳ Not yet enabled</div>
</div>

<!-- ADD ALERT -->
<div class="card">
  <div class="card-title">➕ Add POI Alert</div>
  <div class="row">
    <div>
      <label>Pair / Instrument</label>
      <select id="pair-select" onchange="pairChange()">
        <optgroup label="── Forex ──">
          <option value="EUR/USD">EUR/USD</option>
          <option value="GBP/USD">GBP/USD</option>
          <option value="USD/JPY">USD/JPY</option>
          <option value="USD/CHF">USD/CHF</option>
          <option value="AUD/USD">AUD/USD</option>
          <option value="USD/CAD">USD/CAD</option>
          <option value="NZD/USD">NZD/USD</option>
          <option value="EUR/GBP">EUR/GBP</option>
          <option value="EUR/JPY">EUR/JPY</option>
          <option value="GBP/JPY">GBP/JPY</option>
        </optgroup>
        <optgroup label="── Commodities ──">
          <option value="XAU/USD">XAU/USD (Gold)</option>
          <option value="XAG/USD">XAG/USD (Silver)</option>
        </optgroup>
        <optgroup label="── Indices ──">
          <option value="SPX">SPX (S&P 500)</option>
          <option value="NAS100">NAS100 (Nasdaq)</option>
          <option value="US30">US30 (Dow Jones)</option>
          <option value="GER40">GER40 (DAX)</option>
          <option value="UK100">UK100 (FTSE)</option>
          <option value="JP225">JP225 (Nikkei)</option>
        </optgroup>
        <optgroup label="── Other ──">
          <option value="custom">Custom...</option>
        </optgroup>
      </select>
    </div>
    <div id="custom-wrap" style="display:none">
      <label>Custom Pair</label>
      <input type="text" id="custom-pair" placeholder="e.g. USD/SGD" style="text-transform:uppercase"/>
    </div>
  </div>

  <div class="row">
    <div>
      <label>POI Price</label>
      <input type="number" id="target" class="mono" placeholder="e.g. 1.31500" step="0.00001"/>
    </div>
    <div>
      <label>Pip Tolerance</label>
      <select id="tolerance">
        <option value="2">2 pips</option>
        <option value="5" selected>5 pips</option>
        <option value="10">10 pips</option>
        <option value="20">20 pips</option>
      </select>
    </div>
  </div>

  <button class="btn btn-add" onclick="addAlert()">➕ Add Alert</button>
</div>

<!-- ACTIVE ALERTS -->
<div class="card">
  <div class="card-title">
    📡 Active Alerts
    <button class="clear-btn" onclick="clearAll()">Clear All</button>
  </div>
  <div class="alerts-list" id="alerts-list">
    <div class="empty-alerts">No alerts yet — add your first POI above</div>
  </div>
</div>

<!-- LOG -->
<div class="card">
  <div class="card-title">Activity Log</div>
  <ul class="log-list" id="log-list">
    <li class="empty">No activity yet</li>
  </ul>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getMessaging, getToken, onMessage } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js';

  let messaging = null;

  async function initFirebase() {
    try {
      const res = await fetch('/api/firebase-config');
      const cfg = await res.json();
      if (!cfg.apiKey) return;
      const firebaseApp = initializeApp(cfg);
      messaging = getMessaging(firebaseApp);
      onMessage(messaging, payload => {
        showToast(payload.notification?.title, payload.notification?.body);
      });
      window._fbMessaging = messaging;
      window._fbVapidKey = cfg.vapidKey;
      if (Notification.permission === 'granted') await getFCMToken();
    } catch(e) { console.warn('Firebase init:', e); }
  }

  async function getFCMToken() {
    try {
      if (!window._fbMessaging) return;
      const reg = await navigator.serviceWorker.ready;
      const token = await getToken(window._fbMessaging, {
        vapidKey: window._fbVapidKey,
        serviceWorkerRegistration: reg
      });
      if (token) {
        window._fcmToken = token;
        await fetch('/api/register-token', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({token})
        });
        updateNotifStatus('ok', '✅ Push notifications enabled');
        document.getElementById('notif-btn').style.display = 'none';
      }
    } catch(e) { console.warn('FCM token:', e); }
  }

  window.requestNotifPermission = async function() {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      await getFCMToken();
    } else {
      updateNotifStatus('err', '❌ Blocked — enable in Chrome → Site Settings');
    }
  };

  function showToast(title, body) {
    const d = document.createElement('div');
    d.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;text-align:center;max-width:90vw;box-shadow:0 4px 20px rgba(239,68,68,0.5)';
    d.innerHTML = `🚨 ${title}<br><span style="font-weight:400;font-size:11px">${body}</span>`;
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 8000);
  }

  initFirebase();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js').catch(e => console.warn('SW:', e));
  }

  let prevPrices = {};
  let pollTimer = null;

  function updateNotifStatus(type, msg) {
    const el = document.getElementById('notif-status');
    el.className = 'notif-status ' + type;
    el.textContent = msg;
  }

  window.addEventListener('load', () => {
    if (Notification.permission === 'granted') {
      updateNotifStatus('ok', '✅ Push notifications enabled');
      document.getElementById('notif-btn').style.display = 'none';
    } else if (Notification.permission === 'denied') {
      updateNotifStatus('err', '❌ Blocked — enable in Chrome → Site Settings');
    }
    startPolling();
  });

  function pairChange() {
    document.getElementById('custom-wrap').style.display =
      document.getElementById('pair-select').value === 'custom' ? 'block' : 'none';
  }

  function getActivePair() {
    const v = document.getElementById('pair-select').value;
    return v === 'custom'
      ? document.getElementById('custom-pair').value.trim().toUpperCase()
      : v;
  }

  async function addAlert() {
    const pair = getActivePair();
    const target = parseFloat(document.getElementById('target').value);
    const tol = parseInt(document.getElementById('tolerance').value);

    if (!pair) return alert('Please select a pair');
    if (isNaN(target)) return alert('Please enter a target price');
    if (Notification.permission !== 'granted') {
      if (!confirm('Notifications not enabled — alerts will still show in app. Continue?')) return;
    }

    try {
      const res = await fetch('/api/alerts/add', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ pair, target, tolerance_pips: tol, fcm_token: window._fcmToken || null })
      });
      const data = await res.json();
      if (data.error) { alert('Error: ' + data.error); return; }

      // Clear inputs
      document.getElementById('target').value = '';
      await pollStatus();
    } catch(e) { alert('Server error: ' + e.message); }
  }

  async function removeAlert(id) {
    await fetch('/api/alerts/remove', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id})
    });
    await pollStatus();
  }

  async function clearAll() {
    if (!confirm('Remove all alerts?')) return;
    await fetch('/api/alerts/clear', { method: 'POST' });
    await pollStatus();
  }

  function startPolling() {
    pollStatus();
    pollTimer = setInterval(pollStatus, 10000);
  }

  async function pollStatus() {
    try {
      const res = await fetch('/api/alerts');
      const data = await res.json();
      renderAlerts(data.alerts || {});
      renderLog(data.log || []);
    } catch(e) { console.warn('Poll:', e); }
  }

  function renderAlerts(alerts) {
    const list = document.getElementById('alerts-list');
    const ids = Object.keys(alerts);

    // Update badge
    const watching = ids.filter(id => alerts[id].active).length;
    document.getElementById('pair-count').textContent =
      watching + ' watching' + (ids.length > watching ? `, ${ids.length - watching} triggered` : '');

    if (ids.length === 0) {
      list.innerHTML = '<div class="empty-alerts">No alerts yet — add your first POI above</div>';
      return;
    }

    list.innerHTML = '';
    ids.forEach(id => {
      const a = alerts[id];
      const price = a.current_price;
      const prev = prevPrices[id];
      const change = price && prev ? price - prev : 0;
      if (price) prevPrices[id] = price;

      const pip = a.pair.includes('JPY') ? 0.01 : 0.0001;
      const diffPips = price ? Math.abs(price - a.target) / pip : null;
      const pct = diffPips !== null ? Math.max(0, Math.min(100, 100 - (diffPips / 50 * 100))) : 0;
      const fillColor = pct > 80 ? 'var(--danger)' : pct > 50 ? 'var(--warn)' : 'var(--accent)';

      const fmtPrice = (p) => {
        if (!p) return '—.—';
        if (a.pair.includes('JPY')) return p.toFixed(3);
        if (['XAU','SPX','US30','NAS','GER','UK1'].some(x => a.pair.includes(x))) return p.toFixed(2);
        return p.toFixed(5);
      };

      const card = document.createElement('div');
      card.className = 'alert-card ' + (a.triggered ? 'triggered' : 'watching');
      card.innerHTML = `
        <div class="alert-header">
          <span class="alert-pair">${a.pair}</span>
          <button class="alert-remove" onclick="removeAlert('${id}')">×</button>
        </div>
        <div class="alert-price">${fmtPrice(price)}</div>
        <div class="alert-meta">
          <div class="alert-poi">POI: <span>${a.target}</span> ±${a.tolerance_pips}p</div>
          ${price && prev ? `<div class="alert-change ${change >= 0 ? 'up' : 'down'}">${change >= 0 ? '+' : ''}${change.toFixed(5)}</div>` : ''}
        </div>
        ${diffPips !== null ? `
        <div class="dist-wrap">
          <div class="dist-label"><span>Distance to POI</span><span>${diffPips.toFixed(1)} pips</span></div>
          <div class="track"><div class="fill" style="width:${pct}%;background:${fillColor}"></div></div>
        </div>` : ''}
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <span class="alert-status ${a.triggered ? 'triggered' : 'watching'}">
            ${a.triggered ? '🚨 TRIGGERED' : '👁 Watching'}
          </span>
          <span style="font-size:10px;padding:3px 7px;border-radius:6px;${
            a.market_open === false
              ? 'background:rgba(100,116,139,0.15);color:#64748b'
              : 'background:rgba(16,185,129,0.1);color:#10b981'
          }">
            ${a.market_open === false ? '🔴 Market Closed' : '🟢 Market Open'}
          </span>
        </div>
        ${a.source ? `<div class="alert-updated">⚡ ${a.source} · ${a.last_updated || ''}</div>` : ''}
      `;
      list.appendChild(card);
    });
  }

  function renderLog(log) {
    const list = document.getElementById('log-list');
    if (!log.length) { list.innerHTML = '<li class="empty">No activity yet</li>'; return; }
    list.innerHTML = '';
    log.forEach(e => {
      const li = document.createElement('li');
      li.className = 'log-item';
      li.innerHTML = `<span class="log-t">${e.time}</span><span class="log-m">${e.msg}</span>`;
      list.appendChild(li);
    });
  }
</script>
</body>
</html>
